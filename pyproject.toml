[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lazybridge"
version = "0.3.1"
description = "Zero-boilerplate multi-provider LLM agent framework"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["pydantic>=2.0.0"]

[project.optional-dependencies]
anthropic = ["anthropic>=0.49.0"]
openai    = ["openai>=1.70.0"]
google    = ["google-genai>=1.10.0"]
deepseek  = ["openai>=1.70.0"]
yaml      = ["pyyaml>=6.0"]
all       = ["anthropic>=0.49.0", "openai>=1.70.0", "google-genai>=1.10.0", "pyyaml>=6.0"]

[project.urls]
Changelog = "https://github.com/selvaz/LazyBridge/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["lazybridge"]

[tool.pytest.ini_options]
pythonpath = ["lazybridge"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore:Module already imported so cannot be rewritten; anyio:pytest.PytestAssertRewriteWarning",
]
markers = [
    "live: opt-in live tests that call real provider APIs",
]
