[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lazybridge"
version = "1.0.0"
description = "Zero-boilerplate multi-provider LLM agent framework"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
authors = [{ name = "Marco Selvatici" }]
keywords = ["llm", "agents", "multi-agent", "anthropic", "openai", "google", "pipeline", "tool-use"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = ["pydantic>=2.0.0,<3.0.0"]

# Provider SDKs are capped at the next major to prevent silent breakage
# from `pip install -U` when upstream ships an incompatible release.
# Bump the upper bound intentionally after re-running the provider
# integration tests against the new major.
[project.optional-dependencies]
anthropic = ["anthropic>=0.49.0,<1.0.0"]
openai    = ["openai>=1.70.0,<2.0.0"]
google    = ["google-genai>=1.10.0,<2.0.0"]
deepseek  = ["openai>=1.70.0,<2.0.0"]
# LiteLLM bridge — unlocks 100+ extra providers (Mistral, Cohere, Groq,
# Bedrock, Vertex, Ollama, etc.) behind the ``litellm/`` model-string
# prefix. Native providers still handle their own models directly.
litellm   = ["litellm>=1.40.0,<2.0.0"]
yaml      = ["pyyaml>=6.0,<7.0"]
tools     = ["pypdf>=3.0,<6.0", "python-docx>=1.0,<2.0", "trafilatura>=1.6,<3.0"]
stats     = ["duckdb>=1.0,<2.0", "polars>=1.0,<2.0", "sqlglot>=20.0,<30.0", "statsmodels>=0.14,<0.16", "arch>=7.0,<8.0", "matplotlib>=3.8,<4.0"]
downloader = ["pandas>=2.0,<3.0", "requests>=2.28,<3.0", "yfinance>=0.2,<1.0"]
otel      = ["opentelemetry-api>=1.20,<2.0", "opentelemetry-sdk>=1.20,<2.0"]
# ``pydantic`` is a runtime dependency but tests import it directly
# (fixtures, dataclass coercion, schema validation).  Including it in
# the [test] extra makes ``pip install -e '.[test]'`` a one-step
# bootstrap for newcomers.
test      = ["pytest>=7.0", "pytest-asyncio>=0.23", "pytest-cov>=4.0", "pydantic>=2.0.0,<3.0.0"]
docs      = ["mkdocs-material>=9.0", "mkdocstrings[python]>=0.24"]
all       = ["anthropic>=0.49.0,<1.0.0", "openai>=1.70.0,<2.0.0", "google-genai>=1.10.0,<2.0.0", "litellm>=1.40.0,<2.0.0", "pyyaml>=6.0,<7.0", "pypdf>=3.0,<6.0", "python-docx>=1.0,<2.0", "trafilatura>=1.6,<3.0", "duckdb>=1.0,<2.0", "polars>=1.0,<2.0", "sqlglot>=20.0,<30.0", "statsmodels>=0.14,<0.16", "arch>=7.0,<8.0", "matplotlib>=3.8,<4.0", "pandas>=2.0,<3.0", "requests>=2.28,<3.0", "yfinance>=0.2,<1.0"]

[project.urls]
Homepage      = "https://github.com/selvaz/LazyBridge"
Repository    = "https://github.com/selvaz/LazyBridge"
Documentation = "https://github.com/selvaz/LazyBridge/tree/main/docs"
Changelog     = "https://github.com/selvaz/LazyBridge/blob/main/CHANGELOG.md"
"Bug Tracker" = "https://github.com/selvaz/LazyBridge/issues"

[tool.hatch.build.targets.wheel]
packages = ["lazybridge"]

[tool.hatch.build.targets.sdist]
exclude = [
    "MESSAGES.md",
    "setup_spyder_paths.py",
    "validate_docs.py",
    "artifacts/",
    "website/",
    ".claude/",
    ".github/",
]

[tool.pytest.ini_options]
pythonpath = ["lazybridge"]
testpaths  = ["tests"]
asyncio_mode = "auto"
addopts = "-m 'not live' --ignore=tests/unit/ext"
filterwarnings = [
    "ignore:Module already imported so cannot be rewritten; anyio:pytest.PytestAssertRewriteWarning",
]
markers = [
    "live: opt-in live tests that call real provider APIs (run with: pytest -m live)",
]

# ---------------------------------------------------------------------------
# Ruff — linting & formatting
# ---------------------------------------------------------------------------
[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "E402",    # module-level import not at top (deferred imports are intentional)
    "E501",    # line length handled by formatter
    "E741",    # ambiguous variable name (l, O, I)
    "UP007",   # use X | Y (already used, but some Optional[] remain)
    "SIM105",  # contextlib.suppress vs try/except/pass (readability)
    "SIM108",  # ternary instead of if-else (readability)
    "B008",    # function call in default arg (Pydantic uses this pattern)
    "B905",    # zip() strict= (not always needed)
    "RUF002",  # ambiguous unicode in docstrings (en-dash is intentional)
    "RUF003",  # ambiguous unicode in comments
    "RUF005",  # iterable unpacking vs concatenation (readability)
    "RUF012",  # mutable class variable annotation
    "RUF022",  # __all__ sorted (grouped by category instead)
    "RUF059",  # unused unpacked variable (common in test fixtures)
]

[tool.ruff.lint.isort]
known-first-party = ["lazybridge"]

# ---------------------------------------------------------------------------
# Mypy — gradual type checking
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = false
ignore_missing_imports = true

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["lazybridge"]
# Extensions stay omitted because they carry optional-dependency code that
# the default test environment doesn't install. Provider adapters are now
# INCLUDED (audit M10): the fail_under gate was previously hiding ~2800
# lines of core surface by omitting them. As the provider unit tests grow
# this will become a meaningful signal; until then the gate is set to a
# realistic floor (see fail_under below).
omit = [
    "lazybridge/ext/*",
]

[tool.coverage.report]
# Realistic floor given that the four provider adapters are only exercised
# via focused unit tests (tests/unit/gui/test_audit_wave*.py) and live
# tests (opt-in, skipped in CI).
#
# Ratchet strategy (ChatGPT audit F1): raise this gate whenever a block
# of provider-dedicated unit tests lands.  Target waypoints:
#   50 — after one round of fake-response fixtures per provider
#   60 — after tool-loop + structured-output coverage per provider
#   70 — after streaming + native-tool coverage per provider
# Don't raise the gate without the tests — it just breaks CI.
fail_under = 40
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
