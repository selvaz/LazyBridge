<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LazyBridge — Pipeline Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="/static/styles-graph.css">
  <link rel="stylesheet" href="/static/styles-panels.css">
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <span class="logo"></span>
      <span class="title">LazyBridge</span>
      <span class="sep">/</span>
      <span class="subtitle">Pipeline Visualizer</span>
    </div>
    <div id="meta" class="meta"></div>
  </header>

  <main>
    <section id="canvas-wrap">
      <svg id="canvas" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="canvas-hint">connecting…</div>
      <div id="zoom-controls">
        <button id="zoom-in"    title="Zoom in (+)">+</button>
        <button id="zoom-reset" title="Reset view (0)">⊙</button>
        <button id="zoom-out"   title="Zoom out (-)">−</button>
      </div>
      <div id="level-filter" title="Filter visible layers"></div>
    </section>
    <aside id="inspector"></aside>
  </main>

  <footer id="timeline-wrap"></footer>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
