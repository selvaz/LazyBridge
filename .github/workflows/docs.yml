name: docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install LazyBridge + docs extras
        run: pip install -e ".[docs]"

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Assert llms.txt + llms-full.txt are non-empty
        # The "for LLM assistants" pitch hinges on these two artifacts
        # existing and being current.  mkdocs-llmstxt generates them
        # silently — without an assertion a regression would ship to
        # GitHub Pages with empty files and no build failure.
        # 1024-byte floor catches truly-empty / single-line drift while
        # leaving room for content reorganisation.
        run: |
          for f in site/llms.txt site/llms-full.txt; do
            if [ ! -s "$f" ]; then
              echo "::error::$f missing or empty"; exit 1
            fi
            size=$(stat -c %s "$f")
            if [ "$size" -lt 1024 ]; then
              echo "::error::$f is suspiciously small ($size bytes < 1024)"; exit 1
            fi
            echo "$f: $size bytes"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    needs: build
    # Only publish to GitHub Pages from `main` pushes / manual dispatch.
    # Pull-request runs still execute the `build` job (strict mkdocs +
    # llms.txt assertions) so docs regressions are caught pre-merge,
    # but the site itself is updated only when the change lands on main.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
