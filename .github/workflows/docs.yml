name: docs

on:
  push:
    branches: ["main"]
    # Trigger on docs source + the skill_docs source-of-truth (fragments
    # and the build script that renders them into docs/skill/ and the
    # site guides).
    paths:
      - "docs/**"
      - "lazybridge/skill_docs/**"
      - "mkdocs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install lazybridge + mkdocs
        # ``mkdocs build`` reads from ``docs/``; the source-of-truth lives
        # in ``lazybridge/skill_docs/fragments/``. Install the package so
        # the build script can render fragments → docs/ before mkdocs runs.
        run: |
          pip install -e ".[anthropic,openai,google]"
          pip install mkdocs-material mkdocstrings[python]

      - name: Render fragments → docs/
        run: python -m lazybridge.skill_docs._build

      - name: Build docs
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
