name: release

# Publish to PyPI on a version tag (``v1.0.1``, ``v1.1.0`` etc.)  Uses
# PyPI Trusted Publishing (OIDC) — no API token in repo secrets.
#
# Set-up checklist (one-off, in PyPI project settings → Publishing):
#   * Add a "GitHub Actions" trusted publisher
#     - Owner: selvaz
#     - Repository: LazyBridge
#     - Workflow:   release.yml
#     - Environment: pypi
#
# Until that link exists in PyPI the publish step is a no-op (the
# action exits cleanly without an OIDC token).
#
# Gating: the ``build`` job depends on ``lint``, ``typecheck``, ``unit``,
# and ``docs`` so a tagged commit cannot publish unless the same checks
# that run on PRs (.github/workflows/test.yml + docs.yml) pass on the
# exact tagged SHA.  Without those ``needs:`` a hotfix tag could ship
# broken artefacts even though main is red.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  lint:
    name: lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check lazybridge/ tests/

      - name: Format check
        run: ruff format --check lazybridge/ tests/

  typecheck:
    name: type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,openai,google,test]"
          pip install mypy types-Markdown types-bleach

      - name: Typecheck
        run: mypy lazybridge/

      - name: Skill-doc drift check
        run: python -m lazybridge.skill_docs._build --check

  unit:
    name: unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,openai,google,test]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  docs:
    name: docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install LazyBridge + docs extras
        run: pip install -e ".[docs]"

      - name: Build site (strict)
        run: mkdocs build --strict

  build:
    name: build sdist + wheel
    needs: [lint, typecheck, unit, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        # Catch the "tagged v1.0.1 but pyproject still says 1.0.0" trap
        # at the start of the workflow rather than after the upload.
        run: |
          TAG="${GITHUB_REF##*/}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "tag ${TAG_VERSION} does not match pyproject version ${PKG_VERSION}"
            exit 1
          fi

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload distribution artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lazybridge
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - name: Download distribution artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # ``packages-dir`` defaults to ``dist/`` — explicit for
          # readability.  No password / token: OIDC handles auth.
          packages-dir: dist/

  github-release:
    name: publish GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a release
    steps:
      - uses: actions/checkout@v6

      - name: Download distribution artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Extract this version's CHANGELOG section
        # v1.0.1 shipped with only a git tag and no GitHub Release — the
        # tag/PyPI publish had run standalone with no step that also
        # published release notes. Pull the matching "## [x.y.z] — ..."
        # block out of CHANGELOG.md so the release body isn't blank.
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          awk -v ver="[$VERSION]" '
            $0 ~ "^## \\[" { if (found) exit; if (index($0, ver)) found=1; next }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::no CHANGELOG.md section found for ${TAG}"; exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "LazyBridge ${{ github.ref_name }}"
          body_path: release_notes.md
          files: dist/*
