name: release

# Publish to PyPI on a version tag (``v1.0.1``, ``v1.1.0`` etc.)  Uses
# PyPI Trusted Publishing (OIDC) — no API token in repo secrets.
#
# Set-up checklist (one-off, in PyPI project settings → Publishing):
#   * Add a "GitHub Actions" trusted publisher
#     - Owner: selvaz
#     - Repository: LazyBridge
#     - Workflow:   release.yml
#     - Environment: pypi
#
# Until that link exists in PyPI the publish step is a no-op (the
# action exits cleanly without an OIDC token).  Audit M-J.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        # Catch the "tagged v1.0.1 but pyproject still says 1.0.0" trap
        # at the start of the workflow rather than after the upload.
        run: |
          TAG="${GITHUB_REF##*/}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "tag ${TAG_VERSION} does not match pyproject version ${PKG_VERSION}"
            exit 1
          fi

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload distribution artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lazybridge
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - name: Download distribution artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # ``packages-dir`` defaults to ``dist/`` — explicit for
          # readability.  No password / token: OIDC handles auth.
          packages-dir: dist/
