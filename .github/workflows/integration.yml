name: integration

# Live-provider + heavy-render smoke jobs.  Runs only on the manual
# ``workflow_dispatch`` trigger and on a nightly schedule so PRs and
# regular pushes stay free of provider-API noise / Quarto / WeasyPrint
# system-deps churn.  When live tests fail, treat them as advisory:
# the failure flags a real upstream change that needs investigation,
# not a broken commit on this repo.

on:
  workflow_dispatch:
  schedule:
    # 03:42 UTC nightly — 13 minutes after the CodeQL job (codeql.yml)
    # so we don't hammer the GitHub Actions queue at the same minute.
    - cron: "42 3 * * *"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live:
    name: pytest -m live (${{ matrix.provider }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # ``include:`` carries the provider's cheap-tier model into the
      # job env via ``LB_LIVE_MODEL`` / ``LB_LIVE_MODEL_CAPABLE``.  The
      # live fixtures (tests/live/conftest.py) read those env vars and
      # default to ``claude-haiku-4-5`` if unset — so the non-Anthropic
      # matrix entries would otherwise hit the Anthropic API while
      # only the matrix-provider's key is in scope.  Concrete model
      # ids come from each provider's ``_TIER_ALIASES["cheap"]`` in
      # lazybridge/core/providers/*.py; keep them in sync when a
      # provider rotates its cheap model.
      matrix:
        include:
          - provider: anthropic
            cheap_model: claude-haiku-4-5
            capable_model: claude-sonnet-4-6
          - provider: openai
            cheap_model: gpt-5.4-nano
            capable_model: gpt-5.4-mini
          - provider: google
            cheap_model: gemini-3.1-flash-lite-preview
            capable_model: gemini-3.1-flash-lite-preview
          - provider: deepseek
            cheap_model: deepseek-v4-flash
            capable_model: deepseek-v4-flash
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      LB_LIVE_MODEL: ${{ matrix.cheap_model }}
      LB_LIVE_MODEL_CAPABLE: ${{ matrix.capable_model }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install LazyBridge with the provider matrix entry
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.provider }},test]"

      - name: Skip if the provider's API key is not configured
        # Soft-skip rather than failing — secrets are intentionally
        # absent on forks / PR runs.  We only flag a missing key as
        # an error on the scheduled run from the default branch.
        run: |
          KEY_NAME="$(echo '${{ matrix.provider }}' | tr '[:lower:]' '[:upper:]')_API_KEY"
          if [ -z "${!KEY_NAME}" ]; then
            echo "::warning::$KEY_NAME not set — skipping live tests for ${{ matrix.provider }}"
            exit 0
          fi
          pytest tests/live/ -m live -v --tb=short

  # The ``heavy_render`` job moved to the sibling ``selvaz/LazyReport``
  # repository in 0.7.9 along with the ``report_builder`` subsystem.
  # Add a matching workflow there if you want WeasyPrint / Quarto
  # smoke coverage on a nightly schedule.
