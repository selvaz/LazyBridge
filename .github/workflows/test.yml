name: tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pre-commit
        # Enforce the hooks declared in .pre-commit-config.yaml so the
        # local hooks contributors run match what CI runs.
        # The action handles caching + installing pre-commit itself.
        uses: pre-commit/action@v3.0.1

  lint:
    name: lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check lazybridge/ tests/

      - name: Format check
        run: ruff format --check lazybridge/ tests/

      - name: Import boundary (ext / external_tools / external_pipelines)
        run: python tools/check_ext_imports.py

  typecheck:
    name: type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,openai,google,test]"
          pip install mypy types-Markdown types-bleach

      - name: Typecheck
        run: mypy lazybridge/

      - name: Skill docs drift (fragments → docs/skill/ + lazybridge/skill_docs/)
        # README claims "CI enforces no drift" between fragment sources and
        # the rendered SKILL.md / per-tier files.  ``--check`` exits non-zero
        # if any rendered file differs from what the fragments would produce
        # right now, which catches commits that edit a fragment without
        # re-running the build.  Lives in the typecheck job because it
        # imports the full lazybridge package (and therefore needs the
        # provider SDKs already installed in this job).
        run: python -m lazybridge.skill_docs._build --check

  unit:
    name: unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,openai,google,test]"

      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --tb=short --cov=lazybridge --cov-report=term-missing
