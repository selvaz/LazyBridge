name: tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pre-commit
        # Enforce the hooks declared in .pre-commit-config.yaml so the
        # local hooks contributors run match what CI runs (audit M-J).
        # The action handles caching + installing pre-commit itself.
        uses: pre-commit/action@v3.0.1

  lint:
    name: lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check lazybridge/ tests/

      - name: Format check
        run: ruff format --check lazybridge/ tests/

      - name: Import boundary (ext / external_tools / external_pipelines)
        run: python tools/check_ext_imports.py

  typecheck:
    name: type check
    runs-on: ubuntu-latest
    # Pre-1.0 (alpha): mypy is informational only. The codebase has a
    # backlog of legacy type errors; address them incrementally rather
    # than blocking PRs on the snapshot.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,openai,google,test]"
          pip install mypy

      - name: Typecheck (report-only)
        run: mypy lazybridge/ || true

  unit:
    name: unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,openai,google,test]"

      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --tb=short --cov=lazybridge --cov-report=term-missing
