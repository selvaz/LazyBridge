name: tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

# Default to least-privilege.  Individual jobs override only when they
# need extra permissions (none here — all jobs are read-only against
# the repo and write only test artifacts).
permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pre-commit
        # Enforce the hooks declared in .pre-commit-config.yaml so the
        # local hooks contributors run match what CI runs.
        # The action handles caching + installing pre-commit itself.
        uses: pre-commit/action@v3.0.1

  lint:
    name: lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check lazybridge/ tests/

      - name: Format check
        run: ruff format --check lazybridge/ tests/

  typecheck:
    name: type check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Run the type check against both the ``requires-python`` floor
    # (3.11) and our recommended runtime (3.12).  The strict-tier
    # overrides in ``pyproject.toml`` can flag rules differently
    # between Python versions; pinning both surfaces the drift before
    # users hit it.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,openai,google,test]"
          pip install mypy types-Markdown types-bleach

      - name: Typecheck
        run: mypy lazybridge/

      - name: Skill-doc drift check
        # Asserts lazybridge/skill/SKILL.md exists, is non-empty, and
        # references every public symbol the skill is expected to teach.
        # See lazybridge/skill_docs/_build.py for the gate semantics.
        # Only runs once (on 3.12) because the gate doesn't depend on
        # the Python version.
        if: matrix.python-version == '3.12'
        run: python -m lazybridge.skill_docs._build --check

  unit:
    name: unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,openai,google,test]"

      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --tb=short --cov=lazybridge --cov-report=term-missing
