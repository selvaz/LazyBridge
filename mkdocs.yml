site_name: LazyBridge
site_description: Zero-boilerplate multi-provider LLM composition runtime, not an agent framework. Engine + Tools + State, everything is a tool.
site_url: https://core.lazybridge.com/
repo_url: https://github.com/selvaz/LazyBridge
repo_name: selvaz/LazyBridge
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 LazyBridge — Apache-2.0

docs_dir: docs
strict: true

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            show_root_heading: true
            show_root_toc_entry: false
            heading_level: 3
            docstring_style: google
            merge_init_into_class: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Category guides:
          - best-python-ai-agent-frameworks.md
        Concepts:
          - concepts/*.md
        Guides:
          - guides/**/*.md
        Recipes:
          - recipes/*.md
        Decisions:
          - decisions/*.md
        Reference:
          - reference/*.md
        Errors:
          - errors.md
        Why:
          - why.md
        Comparison:
          - comparison.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
      base_path:
        - .
        - examples
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  # Static version chip in the site header.  Bumped manually on each
  # release in lock-step with ``pyproject.toml``.  When ``mike`` is
  # wired up for multi-version docs, set ``provider: mike`` here and
  # drop the manual ``default``.
  version:
    default: "0.9.0"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/selvaz/LazyBridge
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/lazybridge/
    - icon: fontawesome/solid/envelope
      link: mailto:lazylabsllm@gmail.com
      name: Email LazyBridge Labs

extra_css:
  - stylesheets/extra.css

