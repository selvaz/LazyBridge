# ---------------------------------------------------------------------------
# Build-time hooks — generated content
# ---------------------------------------------------------------------------
# `mkdocs_provider_table` replaces the `<!-- PROVIDER_CAPABILITY_TABLE -->`
# marker on any page with a freshly-rendered support matrix sourced from
# `lazybridge.matrix.provider_capabilities()`.  Keeps README / providers
# docs from drifting when a provider classvar changes.
hooks:
  - tools/mkdocs_provider_table.py
