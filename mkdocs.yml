site_name: LazyBridge
site_description: Zero-boilerplate multi-provider LLM agent framework. Engine + Tools + State, everything is a tool.
site_url: https://docs.lazybridge.com
repo_url: https://github.com/selvaz/LazyBridge
repo_name: selvaz/LazyBridge
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Marco Selvatici — Apache-2.0

docs_dir: docs
strict: true

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
      base_path:
        - .
        - examples
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/selvaz/LazyBridge
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/lazybridge/

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts:
      - Mental model: concepts/mental-model.md
      - Everything is a tool: concepts/everything-is-a-tool.md
      - Progressive complexity: concepts/progressive-complexity.md
      - Canonical vs sugar: concepts/canonical-vs-sugar.md
  - Guides:
      - Basic:
          - Agent: guides/basic/agent.md
          - Tool: guides/basic/tool.md
          - Envelope: guides/basic/envelope.md
          - Native tools: guides/basic/native-tools.md
      - Mid:
          - Memory: guides/mid/memory.md
          - Store: guides/mid/store.md
          - Session: guides/mid/session.md
          - Guards: guides/mid/guards.md
          - verify=: guides/mid/verify.md
          - Chain: guides/mid/chain.md
          - Parallel: guides/mid/parallel.md
          - As tool: guides/mid/as-tool.md
          - HumanEngine: guides/mid/human-engine.md
          - MCP: guides/mid/mcp.md
          - Evals: guides/mid/evals.md
