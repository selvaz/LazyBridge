site_name: LazyBridge
site_description: Zero-boilerplate multi-provider LLM agent framework. Engine + Tools + State, everything is a tool.
site_url: https://selvaz.github.io/LazyBridge/
repo_url: https://github.com/selvaz/LazyBridge
repo_name: selvaz/LazyBridge
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Marco Selvatici — Apache-2.0

docs_dir: docs
strict: true

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            show_root_heading: true
            show_root_toc_entry: false
            heading_level: 3
            docstring_style: google
            merge_init_into_class: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Concepts:
          - concepts/*.md
        Guides:
          - guides/**/*.md
        Recipes:
          - recipes/*.md
        Decisions:
          - decisions/*.md
        Reference:
          - reference/*.md
        Errors:
          - errors.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
      base_path:
        - .
        - examples
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/selvaz/LazyBridge
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/lazybridge/

