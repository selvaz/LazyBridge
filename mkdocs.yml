site_name: LazyBridge
site_description: One Agent, swappable engines, tool-is-tool composition, and Plans with compile-time validation.
site_url: https://selvaz.github.io/LazyBridge/
repo_url: https://github.com/selvaz/LazyBridge
repo_name: selvaz/LazyBridge

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest

nav:
  - Home: index.md
  - Quickstart: quickstart.md

  - Tiers:
    - Basic: tiers/basic.md
    - Mid: tiers/mid.md
    - Full: tiers/full.md
    - Advanced: tiers/advanced.md

  - Guides:
    - Production:
      - Operations checklist: guides/operations.md
    - Basic:
      - Agent: guides/agent.md
      - Tool: guides/tool.md
      - Native tools: guides/native-tools.md
      - Function → Tool: guides/tool-schema.md
      - Envelope: guides/envelope.md
    - Mid:
      - Memory: guides/memory.md
      - Store: guides/store.md
      - Session & tracing: guides/session.md
      - Guards: guides/guards.md
      - Agent.chain: guides/chain.md
      - Agent.parallel: guides/agent-parallel.md
      - Agent.as_tool: guides/as-tool.md
      - MCP integration (alpha): guides/mcp.md
      - HumanEngine: guides/human-engine.md
      - EvalSuite: guides/evals.md
      - Testing (MockAgent): guides/testing.md
    - Full:
      - Plan: guides/plan.md
      - Sentinels: guides/sentinels.md
      - Parallel plan steps: guides/parallel-steps.md
      - SupervisorEngine: guides/supervisor.md
      - Checkpoint & resume: guides/checkpoint.md
      - Exporters: guides/exporters.md
      - GraphSchema: guides/graph-schema.md
      - "verify=": guides/verify.md
    - Reporting (extension):
      - Overview: guides/report-builder.md
      - Single-shot generate_report: guides/report-generate.md
      - FragmentBus: guides/fragment-bus.md
      - Fragment schema: guides/report-fragments.md
      - Assemblers: guides/report-assemblers.md
      - Chart contract: guides/report-charts.md
      - Citations: guides/report-citations.md
      - Multi-format exporters: guides/report-exporters.md
    - Advanced:
      - Providers & model tiers: guides/providers.md
      - Engine protocol: guides/engine-protocol.md
      - BaseProvider: guides/base-provider.md
      - LiteLLM bridge: guides/litellm.md
      - Plan serialization: guides/plan-serialize.md
      - Provider registry: guides/register-provider.md
      - core.types: guides/core-types.md
      - Core vs Extension policy: guides/core-vs-ext.md

  - Recipes:
    - Overview: recipes/index.md
    - Tool calling: recipes/tool-calling.md
    - Structured output: recipes/structured-output.md
    - Plan with resume: recipes/plan-with-resume.md
    - Human-in-the-loop: recipes/human-in-the-loop.md
    - Orchestration tools: recipes/orchestration-tools.md
    - MCP integration: recipes/mcp.md
    - Parallel report pipeline: recipes/parallel-report.md

  - Decision trees:
    - Index: decisions/index.md
    - Pick your tier: decisions/pick-tier.md
    - Return type: decisions/return-type.md
    - State layer: decisions/state-layer.md
    - Composition: decisions/composition.md
    - Parallelism: decisions/parallelism.md
    - HumanEngine vs SupervisorEngine: decisions/human-engine-vs-supervisor.md
    - "verify= placement": decisions/verify-placement.md
    - Checkpoint & resume: decisions/checkpoint.md
    - Which report shape?: decisions/report-shape.md
    - Need Advanced?: decisions/need-advanced.md

  - Reference: reference.md
  - Errors: skill/99_errors.md
  - Claude Skill:
    - Manifest: skill/SKILL.md
    - Overview: skill/00_overview.md
    - Basic: skill/01_basic.md
    - Mid: skill/02_mid.md
    - Full: skill/03_full.md
    - Advanced: skill/04_advanced.md
    - Decision trees: skill/05_decision_trees.md
    - Reference: skill/06_reference.md
    - Errors: skill/99_errors.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/selvaz/LazyBridge
